<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <img src="images/menu.png" />
      <h1>Budget Calculator</h1>
      <img src="images/eecu.png" />
    </nav>
    <main>
      <aside id="income">
        <h2>Monthly Income</h2>
        <span class="salary">
            <img src="images/Frame.png" />
            <p>Salary</p>
          <input type="text" id="salary" name="salary" placeholder="$" />
        </span>
        <span class="investments">
            <img src="images/Frame.png" />
            <p>Investments</p>
          <input type="text" id="investments" name="investments" placeholder="$" />
        </span>
        <span class="business">
            <img src="images/Frame.png" />
            <p>Business</p>
          <input type="text" id="business" name="business" placeholder="$" />
        </span>
        <span class="other">
            <img src="images/Frame.png" />
            <p>Other</p>
          <input type="text" id="other" name="other" placeholder="$" />
        </span>
      </aside>
      <section id="analysis"></section>
      <section id="expenses">
        <h2>Monthly Expenses</h2>
        <span> </span>
      </section>
    </main>
  </body>
</html>
